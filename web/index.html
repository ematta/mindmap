<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MindMap</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="toolbar">
            <button id="boardsBtn" class="toolbar-section-btn">&#9776; Boards</button>
            <span id="currentBoardName" class="board-name-display">My Board</span>
            <span class="toolbar-separator"></span>
            <button id="addNoteBtn">+ Add Idea</button>
            <button id="connectBtn" class="mode-btn">Connect</button>
            <span id="connectHint" class="hint"></span>
            <span id="zoomControls" class="zoom-controls">
                <button id="panLeftBtn" class="zoom-btn" title="Pan Left">&#x25C0;</button>
                <button id="panUpBtn" class="zoom-btn" title="Pan Up">&#x25B2;</button>
                <button id="panDownBtn" class="zoom-btn" title="Pan Down">&#x25BC;</button>
                <button id="panRightBtn" class="zoom-btn" title="Pan Right">&#x25B6;</button>
                <button id="zoomOutBtn" class="zoom-btn" title="Zoom Out">&#8722;</button>
                <button id="resetZoomBtn" class="zoom-btn" title="Reset Zoom">&#x21BA;</button>
                <button id="zoomInBtn" class="zoom-btn" title="Zoom In">+</button>
                <span id="zoomLabel">100%</span>
            </span>
        </div>
        <div id="boardPanel" class="board-panel">
            <div class="board-panel-header">
                <h3>Your Boards</h3>
                <button id="closeBoardPanelBtn" class="close-btn">&times;</button>
            </div>
            <button id="newBoardBtn" class="new-board-btn">+ New Board</button>
            <div id="boardList" class="board-list"></div>
        </div>
        <div id="boardPanelBackdrop" class="board-panel-backdrop"></div>
        <div id="contextMenu" class="context-menu">
            <div class="context-menu-item" data-action="add-idea">
                <span class="context-menu-icon">+</span> Add Idea
            </div>
            <div class="context-menu-separator"></div>
            <div class="context-menu-item" data-action="connect">
                <span class="context-menu-icon">&#x21AA;</span> Connect To...
            </div>
            <div class="context-menu-item has-submenu" data-action="color">
                <span class="context-menu-icon">&#x25CF;</span> Change Color
                <div class="context-submenu">
                    <div class="context-color-option" data-color="0" style="background:#fff9b1;border:2px solid #e6d935"></div>
                    <div class="context-color-option" data-color="1" style="background:#ffcccb;border:2px solid #e67373"></div>
                    <div class="context-color-option" data-color="2" style="background:#b3e6b3;border:2px solid #5cb85c"></div>
                    <div class="context-color-option" data-color="3" style="background:#b3d9ff;border:2px solid #5ba3e6"></div>
                    <div class="context-color-option" data-color="4" style="background:#e6ccff;border:2px solid #a366d9"></div>
                    <div class="context-color-option" data-color="5" style="background:#ffe0b3;border:2px solid #e6a34d"></div>
                </div>
            </div>
            <div class="context-menu-item has-submenu" data-action="theme">
                <span class="context-menu-icon">&#x263E;</span> Theme
                <div class="context-submenu context-theme-submenu">
                    <div class="context-theme-option" data-theme="system">&#x1F5A5; System</div>
                    <div class="context-theme-option" data-theme="light">&#x2600; Light</div>
                    <div class="context-theme-option" data-theme="dark">&#x263E; Dark</div>
                </div>
            </div>
            <div class="context-menu-separator"></div>
            <div class="context-menu-item danger" data-action="delete">
                <span class="context-menu-icon">&#x2715;</span> Delete Idea
            </div>
        </div>
        <div id="connectionMenu" class="context-menu">
            <div class="context-menu-item danger" data-action="delete-connection">
                <span class="context-menu-icon">&#x2715;</span> Delete Connection
            </div>
        </div>
        <div id="canvasMenu" class="context-menu">
            <div class="context-menu-item" data-action="add-idea">
                <span class="context-menu-icon">+</span> Add Idea
            </div>
            <div class="context-menu-separator"></div>
            <div class="context-menu-item has-submenu" data-action="theme">
                <span class="context-menu-icon">&#x263E;</span> Theme
                <div class="context-submenu context-theme-submenu">
                    <div class="context-theme-option" data-theme="system">&#x1F5A5; System</div>
                    <div class="context-theme-option" data-theme="light">&#x2600; Light</div>
                    <div class="context-theme-option" data-theme="dark">&#x263E; Dark</div>
                </div>
            </div>
            <div class="context-menu-separator"></div>
            <div class="context-menu-item" data-action="export">
                <span class="context-menu-icon">&#x2913;</span> Export State
            </div>
            <div class="context-menu-item" data-action="import">
                <span class="context-menu-icon">&#x2912;</span> Import State
            </div>
            <div class="context-menu-separator"></div>
            <div class="context-menu-item" data-action="share">
                <span class="context-menu-icon">&#x2197;</span> Share Link
            </div>
        </div>
        <input type="file" id="importInput" accept=".json" style="display:none" />
        <canvas id="canvas"></canvas>
        <script src="app.js"></script>
    </body>
</html>
